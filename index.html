<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Bedwars Online | Real Multiplayer</title>
<style>
  body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #000; }
  
  /* UI LAYERS */
  #uiLayer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; }
  .interactive { pointer-events: auto; }
  
  #mainMenu {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    background: radial-gradient(circle, transparent 20%, rgba(0,0,0,0.9) 100%);
    color: white; text-align: center;
  }
  
  h1 { font-size: 3.5rem; text-shadow: 4px 4px 0px #ff5533; margin-bottom: 20px; text-transform: uppercase; }
  .menu-panel {
    background: rgba(20, 20, 20, 0.95); padding: 30px; border: 3px solid #ff5533;
    border-radius: 12px; box-shadow: 0 0 30px rgba(255, 85, 51, 0.4); min-width: 320px;
  }

  button {
    background: #ff5533; color: white; border: none; padding: 15px; 
    font-size: 1.2rem; font-weight: bold; cursor: pointer; border-radius: 5px;
    width: 100%; margin-top: 10px; text-transform: uppercase; transition: 0.1s;
  }
  button:hover { background: #ff7755; transform: scale(1.02); }
  .team-btn { font-size: 1.1rem; }
  #btnRed { background: #cc2222; }
  #btnBlue { background: #2222cc; }

  #hud { 
    position: absolute; top: 20px; left: 20px; color: white; 
    background: rgba(0,0,0,0.6); padding: 15px; border-radius: 8px; 
    border-left: 5px solid #ff5533; font-size: 1.1rem;
  }
  #crosshair { 
    position: absolute; top: 50%; left: 50%; width: 8px; height: 8px; 
    border: 2px solid white; border-radius: 50%; transform: translate(-50%, -50%); 
  }
  
  .hidden { display: none !important; }
</style>
</head>
<body>

<div id="uiLayer">
  <div id="mainMenu" class="interactive">
    <h1>Bedwars Online</h1>
    
    <div id="panelPlay" class="menu-panel">
      <button id="playBtn">Join Server</button>
    </div>

    <div id="panelTeams" class="menu-panel hidden">
      <h2>Select Your Team</h2>
      <button class="team-btn" id="btnRed">Red Team</button>
      <button class="team-btn" id="btnBlue">Blue Team</button>
    </div>

    <div id="panelMatchmaking" class="menu-panel hidden">
      <h2 id="mmStatus">Syncing with Firebase...</h2>
      <h1 id="countdownDisplay" style="color: #ffea00;"></h1>
    </div>
  </div>

  <div id="hud" class="hidden">
    <strong>ID:</strong> <span id="myIdDisplay">---</span><br>
    <strong>Team:</strong> <span id="myTeamDisplay">---</span><br>
    <small>WASD to Move | Mouse to Look</small>
  </div>
  <div id="crosshair" class="hidden"></div>
</div>

<script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.153.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.153.0/examples/jsm/"
    }
  }
</script>

<script type="module">
  import * as THREE from 'three';
  import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getDatabase, ref, set, onChildAdded, onChildChanged, onChildRemoved, onDisconnect } 
    from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

  // --- FIREBASE CONFIG ---
  const firebaseConfig = {
    apiKey: "AIzaSyC3Gc_DfcZDCBLxKoDgdlruBPdPNLBOVAo",
    authDomain: "bedwars-2f641.firebaseapp.com",
    projectId: "bedwars-2f641",
    storageBucket: "bedwars-2f641.firebasestorage.app",
    messagingSenderId: "158660772996",
    appId: "1:158660772996:web:d7eacea89d9e2e4115aed1",
    databaseURL: "https://bedwars-2f641-default-rtdb.firebaseio.com"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  
  // Player Profile
  const myPlayerId = Math.floor(Math.random() * 900000 + 100000).toString();
  const myUsername = "Player_" + Math.floor(Math.random() * 9000 + 1000);

  // --- ENGINE VARIABLES ---
  let scene, camera, renderer, controls;
  let myTeam = null;
  let otherPlayers = {}; 
  const worldBlocks = []; // For collision
  const move = { f: false, b: false, l: false, r: false };

  // UI Refs
  const mainMenu = document.getElementById('mainMenu');
  const panelPlay = document.getElementById('panelPlay');
  const panelTeams = document.getElementById('panelTeams');
  const panelMatchmaking = document.getElementById('panelMatchmaking');
  const countdownDisplay = document.getElementById('countdownDisplay');

  init();
  animate();

  function init() {
    // 1. Scene Setup
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87ceeb);

    camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
    camera.position.set(0, 5, 10);

    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    controls = new PointerLockControls(camera, document.body);

    scene.add(new THREE.AmbientLight(0xffffff, 0.6));
    const sun = new THREE.DirectionalLight(0xffffff, 0.8);
    sun.position.set(10, 20, 10);
    scene.add(sun);

    // 2. Menu Logic
    document.getElementById('playBtn').addEventListener('click', () => {
      panelPlay.classList.add('hidden');
      panelTeams.classList.remove('hidden');
    });

    document.querySelectorAll('.team-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        myTeam = e.target.id.replace('btn', '');
        document.getElementById('myTeamDisplay').innerText = myTeam;
        document.getElementById('myIdDisplay').innerText = myUsername;
        panelTeams.classList.add('hidden');
        panelMatchmaking.classList.remove('hidden');
        startMatchmaking();
      });
    });

    window.addEventListener('resize', onWindowResize);
  }

  function startMatchmaking() {
    // Register player in Firebase
    const playerRef = ref(db, `players/${myPlayerId}`);
    set(playerRef, {
      id: myPlayerId,
      name: myUsername,
      team: myTeam,
      x: 0, y: 2, z: 0,
      ry: 0,
      lastSeen: Date.now()
    });

    onDisconnect(playerRef).remove();

    // Start Real Listeners
    setupMultiplayerSync();

    // 3 Second "Matchmaking" timer
    let count = 3;
    countdownDisplay.innerText = count;
    const timer = setInterval(() => {
      count--;
      countdownDisplay.innerText = count;
      if (count <= 0) {
        clearInterval(timer);
        enterWorld();
      }
    }, 1000);
  }

  function enterWorld() {
    mainMenu.classList.add('hidden');
    document.getElementById('hud').classList.remove('hidden');
    document.getElementById('crosshair').classList.remove('hidden');
    
    // Create Map
    buildMap();
    
    // Teleport to Team Base
    if (myTeam === "Red") camera.position.set(-20, 2, 0);
    else camera.position.set(20, 2, 0);

    controls.lock();

    // Heartbeat: Update Firebase every 50ms (for smooth movement)
    setInterval(updateFirebasePosition, 50);
  }

  function buildMap() {
    // Grass
    const ground = new THREE.Mesh(
      new THREE.PlaneGeometry(100, 100),
      new THREE.MeshLambertMaterial({ color: 0x44aa44 })
    );
    ground.rotation.x = -Math.PI/2;
    scene.add(ground);

    // Pillars for Collision Testing
    for(let i=0; i<8; i++) {
      const geo = new THREE.BoxGeometry(4, 8, 4);
      const mat = new THREE.MeshLambertMaterial({ color: 0x666666 });
      const pillar = new THREE.Mesh(geo, mat);
      const px = (Math.random() - 0.5) * 40;
      const pz = (Math.random() - 0.5) * 40;
      pillar.position.set(px, 4, pz);
      scene.add(pillar);
      
      // Store Bounding Box for Physics
      worldBlocks.push(new THREE.Box3().setFromObject(pillar));
    }
  }

  function setupMultiplayerSync() {
    const playersRef = ref(db, 'players');

    // New Player Joined
    onChildAdded(playersRef, (snapshot) => {
      const data = snapshot.val();
      if (data.id !== myPlayerId) spawnRemotePlayer(data);
    });

    // Player Moved/Rotated
    onChildChanged(playersRef, (snapshot) => {
      const data = snapshot.val();
      if (data.id !== myPlayerId && otherPlayers[data.id]) {
        otherPlayers[data.id].position.set(data.x, data.y, data.z);
        otherPlayers[data.id].rotation.y = data.ry;
      }
    });

    // Player Left
    onChildRemoved(playersRef, (snapshot) => {
      const id = snapshot.key;
      if (otherPlayers[id]) {
        scene.remove(otherPlayers[id]);
        delete otherPlayers[id];
      }
    });
  }

  function spawnRemotePlayer(data) {
    const group = new THREE.Group();
    
    // Character Body
    const body = new THREE.Mesh(
      new THREE.BoxGeometry(1.2, 2.5, 1.2),
      new THREE.MeshLambertMaterial({ color: data.team === "Red" ? 0xff0000 : 0x0000ff })
    );
    group.add(body);

    // Head/Eyes (to show direction)
    const eyes = new THREE.Mesh(
      new THREE.BoxGeometry(0.8, 0.4, 0.5),
      new THREE.MeshLambertMaterial({ color: 0x000000 })
    );
    eyes.position.set(0, 0.8, -0.5);
    group.add(eyes);

    group.position.set(data.x, data.y, data.z);
    scene.add(group);
    otherPlayers[data.id] = group;
  }

  function updateFirebasePosition() {
    if (!controls.isLocked) return;
    set(ref(db, `players/${myPlayerId}`), {
      id: myPlayerId,
      name: myUsername,
      team: myTeam,
      x: camera.position.x,
      y: camera.position.y - 1.2, // Adjust mesh to feet level
      z: camera.position.z,
      ry: camera.rotation.y,
      lastSeen: Date.now()
    });
  }

  // --- PHYSICS ENGINE ---
  function checkPhysics(pos) {
    const playerRadius = 0.6;
    const playerBB = new THREE.Box3().setFromCenterAndSize(
      pos, 
      new THREE.Vector3(playerRadius, 2, playerRadius)
    );

    for(let block of worldBlocks) {
      if (playerBB.intersectsBox(block)) return true;
    }
    return false;
  }

  function animate() {
    requestAnimationFrame(animate);

    if (controls.isLocked) {
      const prevPos = camera.position.clone();
      const speed = 0.15;

      if (move.f) controls.moveForward(speed);
      if (move.b) controls.moveForward(-speed);
      if (move.l) controls.moveRight(-speed);
      if (move.r) controls.moveRight(speed);

      // If we walked into something, undo movement
      if (checkPhysics(camera.position)) {
        camera.position.copy(prevPos);
      }
    }

    renderer.render(scene, camera);
  }

  // Inputs
  const handleKey = (code, isDown) => {
    if (code === 'KeyW') move.f = isDown;
    if (code === 'KeyS') move.b = isDown;
    if (code === 'KeyA') move.l = isDown;
    if (code === 'KeyD') move.r = isDown;
  };
  document.addEventListener('keydown', (e) => handleKey(e.code, true));
  document.addEventListener('keyup', (e) => handleKey(e.code, false));

  function onWindowResize() {
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  }
</script>
</body>
</html>
