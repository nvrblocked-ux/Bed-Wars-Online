<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bedwars Online</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="uiLayer">
        <div id="mainMenu" class="interactive">
            <h1>Bedwars Online</h1>
            <div id="panelPlay" class="menu-panel">
                <button id="playBtn">Join Server</button>
            </div>

            <div id="panelMode" class="menu-panel hidden">
                <h2>Select Mode</h2>
                <button id="mode2">2 Teams (1v1)</button>
                <button id="mode4">4 Teams (4-way)</button>
            </div>

            <div id="panelTeams" class="menu-panel hidden">
                <h2>Select Your Team</h2>
                <div id="teamGrid">
                    <button class="team-btn" id="btnRed">Red</button>
                    <button class="team-btn" id="btnBlue">Blue</button>
                    <button class="team-btn hidden" id="btnGreen">Green</button>
                    <button class="team-btn hidden" id="btnYellow">Yellow</button>
                </div>
            </div>

            <div id="panelMatchmaking" class="menu-panel hidden">
                <h2 id="mmStatus">Generating Islands...</h2>
                <h1 id="countdownDisplay"></h1>
            </div>
        </div>

        <div id="hud" class="hidden">
            <div class="stats">
                <strong>ID:</strong> <span id="myIdDisplay">---</span> | 
                <strong>Team:</strong> <span id="myTeamDisplay">---</span>
            </div>
            <div class="controls-hint">WASD: Move | Space: Jump</div>
        </div>
        <div id="crosshair" class="hidden"></div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.153.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.153.0/examples/jsm/"
            }
        }
    </script>
    <script type="module" src="game.js"></script>
</body>
</html>v
